<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cyber Guard Pro</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root { --accent: #00d2ff; --bg: #0b0e14; --card: #1c2128; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; }
        
        /* Защита */
        #lock { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .pin { background: var(--card); border: 2px solid var(--accent); color: white; padding: 15px; border-radius: 12px; font-size: 24px; text-align: center; width: 120px; }

        header { background: var(--card); padding: 15px; display: flex; justify-content: space-between; border-bottom: 1px solid #30363d; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        .bubble { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 15px; line-height: 1.4; }
        .out { align-self: flex-end; background: var(--accent); color: black; }
        .in { align-self: flex-start; background: var(--card); border: 1px solid #30363d; }

        .input-area { background: var(--card); padding: 15px; display: flex; gap: 10px; }
        input[type="text"] { flex: 1; background: #0d1117; border: 1px solid #30363d; color: white; padding: 12px; border-radius: 20px; outline: none; }
        
        /* Видео звонок в стиле Telegram */
        #call-ui { position: fixed; inset: 0; background: #000; display: none; z-index: 2000; }
        #remote-v { width: 100%; height: 100%; object-fit: cover; }
        #local-v { width: 90px; height: 130px; position: absolute; top: 20px; right: 20px; border-radius: 10px; border: 2px solid var(--accent); object-fit: cover; z-index: 2001; }
        .controls { position: absolute; bottom: 50px; width: 100%; display: flex; justify-content: center; gap: 40px; }
        .end-btn { background: #ff4444; width: 65px; height: 65px; border-radius: 50%; border: none; color: white; font-size: 30px; cursor: pointer; }
    </style>
</head>
<body>

<div id="lock">
    <h2>🔒 Введите ПИН</h2>
    <input type="password" class="pin" id="pin" maxlength="4" oninput="if(this.value==='1234')document.getElementById('lock').style.display='none'">
</div>

<header>
    <div id="status">📡 Подключение...</div>
    <button onclick="startCall()" style="background:none; border:none; color:var(--accent); font-size:22px;">📞</button>
</header>

<div id="chat-box"></div>

<div id="call-ui">
    <video id="remote-v" autoplay playsinline></video>
    <video id="local-v" autoplay playsinline muted></video>
    <div class="controls">
        <button class="end-btn" onclick="location.reload()">❌</button>
    </div>
</div>

<div class="input-area">
    <button onclick="connectFriend()" style="background:none; border:none; color:var(--accent); font-size:24px;">➕</button>
    <input type="text" id="mIn" placeholder="Сообщение...">
    <button onclick="sendMsg()" style="background:none; border:none; color:var(--accent); font-size:24px;">➤</button>
</div>

<script>
    const KEY = "Secret123";
    
    // Настройки для отличной связи (Google STUN серверы)
    const peerConfig = {
        config: {
            'iceServers': [
                { url: 'stun:stun.l.google.com:19302' },
                { url: 'stun:stun1.l.google.com:19302' },
                { url: 'stun:stun2.l.google.com:19302' }
            ]
        }
    };

    const peer = new Peer(peerConfig);
    let conn = null;

    peer.on('open', id => {
        document.getElementById('status').innerText = "Ваш ID: " + id;
        console.log("Peer ID:", id);
    });

    // Обработка входящего соединения
    peer.on('connection', c => {
        conn = c;
        setupConn();
    });

    // Обработка входящего звонка
    peer.on('call', async call => {
        if(confirm("Входящий звонок! Ответить?")) {
            const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            showCallUI(stream);
            call.answer(stream);
            call.on('stream', remoteStream => {
                document.getElementById('remote-v').srcObject = remoteStream;
            });
        }
    });

    function connectFriend() {
        const id = prompt("Введите ID друга:");
        if(id) {
            conn = peer.connect(id);
            setupConn();
        }
    }

    function setupConn() {
        conn.on('data', data => {
            const bytes = CryptoJS.AES.decrypt(data, KEY);
            renderMsg(bytes.toString(CryptoJS.enc.Utf8), 'in');
        });
    }

    function sendMsg() {
        const text = document.getElementById('mIn').value;
        if(text && conn) {
            const encrypted = CryptoJS.AES.encrypt(text, KEY).toString();
            conn.send(encrypted);
            renderMsg(text, 'out');
            document.getElementById('mIn').value = "";
        }
    }

    function renderMsg(t, type) {
        const d = document.createElement('div');
        d.className = `bubble ${type}`;
        d.innerText = t;
        document.getElementById('chat-box').appendChild(d);
        document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
    }

    async function startCall() {
        const id = conn ? conn.peer : prompt("Введите ID для звонка:");
        const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
        showCallUI(stream);
        const call = peer.call(id, stream);
        call.on('stream', remoteStream => {
            document.getElementById('remote-v').srcObject = remoteStream;
        });
    }

    function showCallUI(stream) {
        document.getElementById('call-ui').style.display = 'block';
        document.getElementById('local-v').srcObject = stream;
    }
</script>
</body>
</html>
