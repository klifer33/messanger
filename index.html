<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Messenger</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        :root { --main-color: #0088cc; --bg: #e6ebee; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Интерфейс */
        header { background: var(--main-color); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        
        /* Сообщения */
        .msg { max-width: 75%; padding: 10px 15px; border-radius: 18px; font-size: 15px; line-height: 1.4; position: relative; }
        .sent { align-self: flex-end; background: #efffde; color: #000; border-bottom-right-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .received { align-self: flex-start; background: white; color: #000; border-bottom-left-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        
        /* Ввод */
        .input-bar { background: white; padding: 10px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; border: none; background: #f1f1f1; padding: 12px; border-radius: 20px; outline: none; }
        .btn { background: var(--main-color); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* Видео */
        #video-grid { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; flex-direction: column; z-index: 1000; }
        video { width: 100%; height: 50%; object-fit: cover; background: #222; }
        #my-id-display { font-size: 10px; color: #eee; padding: 5px; background: rgba(0,0,0,0.5); position: fixed; top: 60px; width: 100%; text-align: center; }
        .close-call { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: #ff3b30; width: 60px; height: 60px; border-radius: 50%; color: white; font-size: 24px; border: none; }
    </style>
</head>
<body>

<header>
    <span>MESSENGER PRO</span>
    <button class="btn" onclick="startCallPrompt()" style="background:none; font-size: 20px;">📞</button>
</header>

<div id="my-id-display">Загрузка вашего ID...</div>

<div id="chat-window"></div>

<div id="video-grid">
    <video id="remote-video" autoplay playsinline></video>
    <video id="local-video" autoplay playsinline muted style="height: 25%; width: 30%; position: absolute; bottom: 100px; right: 10px; border: 2px solid white;"></video>
    <button class="close-call" onclick="location.reload()">❌</button>
</div>

<div class="input-bar">
    <input type="text" id="msgInput" placeholder="Введите сообщение...">
    <button class="btn" onclick="sendMsg()">➤</button>
</div>

<script>
    // 1. Инициализация связи через PeerJS (это заменяет сервер)
    const peer = new Peer(); 
    let conn;
    let myStream;

    peer.on('open', (id) => {
        document.getElementById('my-id-display').innerText = "Ваш ID для друга: " + id;
        console.log('My ID: ' + id);
    });

    // 2. Логика получения сообщений и звонков
    peer.on('connection', (connection) => {
        conn = connection;
        setupChat();
    });

    peer.on('call', async (call) => {
        if (confirm("Входящий видеозвонок! Ответить?")) {
            const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            myStream = stream;
            document.getElementById('video-grid').style.display = 'flex';
            document.getElementById('local-video').srcObject = stream;
            call.answer(stream);
            call.on('stream', (remoteStream) => {
                document.getElementById('remote-video').srcObject = remoteStream;
            });
        }
    });

    // 3. Функции управления
    function sendMsg() {
        const text = document.getElementById('msgInput').value;
        if (!text) return;
        
        // Отображаем у себя
        renderMsg(text, 'sent');
        document.getElementById('msgInput').value = "";

        // Отправляем другу (нужно знать его ID)
        if (!conn) {
            const friendId = prompt("Введите ID друга, чтобы начать чат:");
            conn = peer.connect(friendId);
            conn.on('open', () => {
                conn.send(text);
                setupChat();
            });
        } else {
            conn.send(text);
        }
    }

    function setupChat() {
        conn.on('data', (data) => {
            renderMsg(data, 'received');
        });
    }

    function renderMsg(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        document.getElementById('chat-window').appendChild(div);
        document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
    }

    async function startCallPrompt() {
        const friendId = prompt("Кому звоним? Введите ID друга:");
        if (!friendId) return;

        const stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
        myStream = stream;
        document.getElementById('video-grid').style.display = 'flex';
        document.getElementById('local-video').srcObject = stream;

        const call = peer.call(friendId, stream);
        call.on('stream', (remoteStream) => {
            document.getElementById('remote-video').srcObject = remoteStream;
        });
    }
</script>

</body>
</html>
